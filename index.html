<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | หน้าแรก</title>
    <style>
        /* CSS ร่วมสำหรับทุกหน้าเพื่อธีมพาสเทลฟ้าน้ำเงินขยับได้ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sarabun', sans-serif;
        }

        /* เอฟเฟกต์พื้นหลังสีฟ้า-น้ำเงินพาสเทลขยับได้ */
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #d4f1f9, #a9def9, #e8f0fe, #b3c5ff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2b3e50;
        }

     gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* เมนูนำทาง (Navigation Bar) */
        nav {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: #465a7a;
            font-weight: bold;
            margin: 0 15px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background-color: #4682b4;
            color: white;
            box-shadow: 0 4px 10px rgba(70, 130, 180, 0.3);
        }

        /* การจัดรูปเลย์เอาต์ของกล่องเนื้อหา */
        .container {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: translateY(0);
            animation: floatUp 1s ease-out;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        p {
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="active">หน้าแรก</a>
        <a href="about.html">ประวัติส่วนตัว</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="portfolio.html">ผลงาน/กิจกรรม</a>
        <a href="contact.html">ช่องทางติดต่อ</a>
    </nav>

    <div class="container">
        <h1>WelcomePortfolio my</h1>
        <p> ขอเชิญทุกท่านกดเลือกดูตามเมนูด้านบนได้เลยค่ะ</p>
        <a href="about.html" class="btn">ทำความรู้จักกันเลย</a>
    </div>

</body>
</html>
