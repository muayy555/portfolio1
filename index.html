<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก - My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS เฉพาะสำหรับสไตล์และธีมสีชมพูพาสเทล */
        :root {
            --pink-primary:#78A3D4 ;
            --pink-light:#AFD5F0 ;
            --pink-dark:#81D4FA#;
            --text-color: #000000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pink-light);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background-color: #ffffff;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        nav a {
            color: var(--pink-dark);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff8fab;
            text-shadow: 0 0 8px rgba(251, 111, 146, 0.4);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        /* เอฟเฟกต์กรอบรูป */
        .profile-frame {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid var(--pink-primary);
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(251, 111, 146, 0.2);
            transition: transform 0.5s ease;
        }

        .profile-frame:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* เอฟเฟกต์ปุ่ม */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--pink-dark);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(251, 111, 146, 0.3);
        }

        .btn:hover {
            background-color: #ff8fab;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(251, 111, 146, 0.5);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #a3a3a3;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">หน้าหลัก</a>
        <a href="about.html">ประวัติส่วนตัว</a>
        <a href="education.html">ประวัติการศึกษา</a>
        <a href="portfolio.html">ผลงาน/กิจกรรม</a>
        <a href="contact.html">ช่องทางการติดต่อ</a>
    </nav>

    <div class="container">
        <!--temp_image_5C19CA7A-DC8D-46F -->
        <div class="profile-frame">
            <img src="temp_image_5C19CA7A-DC8D-46F" alt="temp_image_5C19CA7A-DC8D-46F7">
        </div>
        <h1>ยินดีต้อนรับสู่ Portfolio ของฉัน</h1>
        <p>ยินดีที่ได้รู้จักทุกคนค่ะ</p>
        <a href="about.html" class="btn">ทำความรู้จักกันเพิ่มขึ้น</a>
    </div>

    <footer>
        © 2026 Designed with 💗 by Student M.6
    </footer>

</body>
</html>
